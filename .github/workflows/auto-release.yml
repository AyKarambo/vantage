# Auto-release on every push to main.
#
# Tag-driven: the version is derived from the latest `v*` tag plus the
# Conventional Commits since it (feat -> minor, fix/others -> patch, a `type!:`
# subject or `BREAKING CHANGE` footer -> major). The bump is applied to
# package.json only inside the runner (so the built installer carries the right
# version) and is NOT committed back — nothing is pushed to the protected `main`
# branch. The release action creates the tag and publishes the GitHub Release.
#
# Because it never pushes to a branch, it cannot loop on itself and needs no
# bypass of branch protection. package.json on `main` stays at its floor; the
# tag, the Release and the installer filename carry the real version.
#
# Signing happens IN the build via SSL.com eSigner (scripts/esigner-sign.cjs):
# when the four ES_* repo secrets are configured, the app exe, uninstaller and
# installer are all signed with the IV certificate (required for the Overwolf
# gaming packages / GEP to load in distributed builds). Without the secrets the
# hook no-ops and this publishes an unsigned installer, same as before.
# Runbook: docs/signing.md. Each signed release consumes 3 eSigner credits.
name: auto-release

on:
  push:
    branches: [main]

# Serialize releases so two quick pushes can't race on the tag/version.
concurrency:
  group: auto-release
  cancel-in-progress: false

permissions:
  contents: write # create the tag + GitHub Release

jobs:
  release:
    runs-on: windows-latest
    env:
      # 'true' only when every eSigner secret is present — gates the signing steps
      # (the secrets context can't be used directly in step `if:` conditions).
      HAS_ESIGNER: ${{ secrets.ES_USERNAME != '' && secrets.ES_PASSWORD != '' && secrets.ES_CREDENTIAL_ID != '' && secrets.ES_TOTP_SECRET != '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history + tags for the Conventional-Commit range

      - uses: actions/setup-node@v4
        with:
          # 24 = current active LTS (not 20): the history store runs on node:sqlite,
          # a builtin that Node 20 lacks, so `npm test` here must have it too (the
          # packaged app gets it from ow-electron 39's bundled Node 22.22; source is
          # type-pinned to that runtime via @types/node@22). LTS-only by policy.
          node-version: 24
          cache: npm

      - run: npm ci

      # Quality gates — a red main never publishes a release.
      - run: npm run typecheck
      - run: npm test

      - name: Compute next version from tags + Conventional Commits
        id: bump
        shell: bash
        run: |
          set -euo pipefail
          last_tag=$(git describe --tags --match 'v*' --abbrev=0 2>/dev/null || true)
          if [ -n "$last_tag" ]; then base="${last_tag#v}"; range="${last_tag}..HEAD"; else base="0.0.0"; range="HEAD"; fi
          log=$(git log "$range" --format='%B')
          if grep -qiE '^[a-z]+(\([^)]*\))?!:' <<< "$log" || grep -qE 'BREAKING[ -]CHANGE' <<< "$log"; then
            level=major
          elif grep -qiE '^feat(\([^)]*\))?:' <<< "$log"; then
            level=minor
          else
            level=patch
          fi
          next=$(node -e "const p='${base}'.split('.').map(Number);const l='${level}';const v=l==='major'?[p[0]+1,0,0]:l==='minor'?[p[0],p[1]+1,0]:[p[0],p[1],p[2]+1];console.log(v.join('.'))")
          # Apply to package.json for the build only — not committed.
          npm version "$next" --no-git-tag-version --allow-same-version >/dev/null
          echo "level=$level" >> "$GITHUB_OUTPUT"
          echo "version=$next" >> "$GITHUB_OUTPUT"
          echo "tag=v$next" >> "$GITHUB_OUTPUT"
          echo "Bump: ${last_tag:-<none>} ($base) -> v$next ($level)"

      # SSL.com CodeSignTool for the eSigner sign hook. The zip (~220 MB, bundles its
      # own JDK) has NO top-level folder — extract into a dedicated dir.
      - name: Set up CodeSignTool (SSL.com eSigner)
        if: env.HAS_ESIGNER == 'true'
        shell: pwsh
        run: |
          $zip = Join-Path $env:RUNNER_TEMP 'CodeSignTool.zip'
          $dir = Join-Path $env:RUNNER_TEMP 'CodeSignTool'
          Invoke-WebRequest -Uri 'https://www.ssl.com/download/codesigntool-for-windows/' -OutFile $zip
          New-Item -ItemType Directory -Force $dir | Out-Null
          Expand-Archive -Path $zip -DestinationPath $dir -Force
          "CODE_SIGN_TOOL_PATH=$dir" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      # ow-electron-builder -> release/Vantage-Setup-<ver>.exe (--publish=never).
      # scripts/esigner-sign.cjs signs the app exe, uninstaller and installer during
      # the build when the ES_* env is present; otherwise it warns and leaves them
      # unsigned. (No CSC_* vars: the custom sign hook is the only Windows signer.)
      - name: Build installer
        shell: bash
        env:
          ES_USERNAME: ${{ secrets.ES_USERNAME }}
          ES_PASSWORD: ${{ secrets.ES_PASSWORD }}
          ES_CREDENTIAL_ID: ${{ secrets.ES_CREDENTIAL_ID }}
          ES_TOTP_SECRET: ${{ secrets.ES_TOTP_SECRET }}
        run: npm run release

      # A signed release must actually be signed — catch silent hook regressions.
      - name: Verify Authenticode signature
        if: env.HAS_ESIGNER == 'true'
        shell: pwsh
        run: |
          $exe = Get-ChildItem release/Vantage-Setup-*.exe | Select-Object -First 1
          $sig = Get-AuthenticodeSignature $exe.FullName
          if ($sig.Status -ne 'Valid') { throw "Signature check failed for $($exe.Name): $($sig.Status) — $($sig.StatusMessage)" }
          Write-Host "Signed: $($exe.Name) by $($sig.SignerCertificate.Subject)"

      # Creates the tag at this commit and publishes the Release with the exe.
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.bump.outputs.tag }}
          name: Vantage ${{ steps.bump.outputs.version }}
          generate_release_notes: true
          files: |
            release/Vantage-Setup-*.exe
            release/Vantage-Setup-*.exe.blockmap
