# Build the Windows installer. CI always produces an UNSIGNED artifact.
#
# Signing is a manual, local step — see docs/signing.md. Certum's SimplySign cert is
# built around interactive OTP approval (via the SimplySign mobile app) with sessions
# capped at ~2 hours; there's no supported unattended/CI signing path for it, so we
# don't try to fake one here. Download this artifact (or build locally) and run
# `npm run sign:local` before uploading to the Overwolf App Store or a GitHub release.
name: release

on:
  workflow_dispatch:
  push:
    tags: ['v*']

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          # 24 = current active LTS (not 20): the history store runs on node:sqlite,
          # a builtin that Node 20 lacks, so `npm test` here must have it too (the
          # packaged app gets it from ow-electron 39's bundled Node 22.22; source is
          # type-pinned to that runtime via @types/node@22). LTS-only by policy.
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      # ow-electron-builder → release/Vantage-Setup-<ver>.exe (unsigned; --publish=never)
      - run: npm run release
      - uses: actions/upload-artifact@v4
        with:
          name: installer-unsigned
          path: release/*.exe
          if-no-files-found: error
