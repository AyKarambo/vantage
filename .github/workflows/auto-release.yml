# Auto-release on every push to main.
#
# Bumps the version from Conventional Commits (feat -> minor, fix/others ->
# patch, a `type!:` subject or `BREAKING CHANGE` footer -> major), builds the
# unsigned Windows installer, and publishes a GitHub Release with it attached.
#
# The bump commit is pushed back to main with the default GITHUB_TOKEN, which by
# design does NOT re-trigger workflows, and is marked [skip ci] as a second
# guard, so this never loops on itself.
#
# Signing stays a manual, local step: CI artifacts are UNSIGNED (SmartScreen
# still warns). The tag-triggered `release.yml` builds a downloadable unsigned
# artifact for that local `npm run sign:local` path; this workflow is the
# automatic, publish-on-merge path.
name: auto-release

on:
  push:
    branches: [main]

# Serialize releases so two quick pushes can't race on the tag/version.
concurrency:
  group: auto-release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    # Don't act on our own bump commit (belt-and-suspenders alongside the
    # GITHUB_TOKEN no-retrigger behaviour and [skip ci]).
    if: ${{ !startsWith(github.event.head_commit.message, 'chore(release):') }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history + tags for the Conventional-Commit range

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Quality gates — a red main never publishes a release.
      - run: npm run typecheck
      - run: npm test

      - name: Determine version bump from Conventional Commits
        id: bump
        shell: bash
        run: |
          set -euo pipefail
          last_tag=$(git describe --tags --match 'v*' --abbrev=0 2>/dev/null || true)
          if [ -n "$last_tag" ]; then range="${last_tag}..HEAD"; else range="HEAD"; fi
          log=$(git log "$range" --format='%B')
          if grep -qiE '^[a-z]+(\([^)]*\))?!:' <<< "$log" || grep -qE 'BREAKING[ -]CHANGE' <<< "$log"; then
            level=major
          elif grep -qiE '^feat(\([^)]*\))?:' <<< "$log"; then
            level=minor
          else
            level=patch
          fi
          new=$(npm version "$level" --no-git-tag-version)
          echo "level=$level" >> "$GITHUB_OUTPUT"
          echo "tag=$new" >> "$GITHUB_OUTPUT"
          echo "version=${new#v}" >> "$GITHUB_OUTPUT"
          echo "Bump: ${last_tag:-<none>} -> $new ($level)"

      # ow-electron-builder -> release/Vantage-Setup-<ver>.exe (unsigned; --publish=never)
      - name: Build installer
        shell: bash
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npm run release

      - name: Commit, tag and push the version bump
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add package.json package-lock.json
          git commit -m "chore(release): ${{ steps.bump.outputs.tag }} [skip ci]"
          git tag "${{ steps.bump.outputs.tag }}"
          git push origin HEAD:main
          git push origin "${{ steps.bump.outputs.tag }}"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.bump.outputs.tag }}
          name: Vantage ${{ steps.bump.outputs.version }}
          generate_release_notes: true
          files: |
            release/Vantage-Setup-*.exe
            release/Vantage-Setup-*.exe.blockmap
